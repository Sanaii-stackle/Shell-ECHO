<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Shell ECHO — Technical Process</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #080808; font-family: 'Trebuchet MS', sans-serif; color: #e0e0e0; }
    ::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">

const SHELL_YELLOW = "#FBCE07";

const stages = [
  {
    id: 1, emoji: "🗑️", title: "Waste Collection",
    subtitle: "Fuel cities pay Shell to collect",
    color: "#1a1a1a", glow: "#888888",
    stats: [
      { label: "Daily Intake", value: "500 tons" },
      { label: "Collection Fee", value: "$50/ton" },
      { label: "Annual Revenue", value: "$9.1M" }
    ],
    detail: "Municipalities deliver waste daily. Shell gets paid to take its fuel source."
  },
  {
    id: 2, emoji: "🔥", title: "Combustion Furnace",
    subtitle: "850–1000°C controlled burn",
    color: "#3a0a00", glow: "#ff4400",
    stats: [
      { label: "Temperature", value: "1000°C" },
      { label: "Capacity", value: "500t/day" },
      { label: "Capture Points", value: "3 stages" }
    ],
    detail: "Waste burns at high temperatures in a sealed system enabling heat capture."
  },
  {
    id: 3, emoji: "⚗️", title: "Thermal Capture",
    subtitle: "Multi-stage heat recovery",
    color: "#2a2000", glow: "#FBCE07",
    stats: [
      { label: "Efficiency", value: "Up to 80%" },
      { label: "vs Standard", value: "20–25%" },
      { label: "Cost/MWh", value: "$10–30" }
    ],
    detail: "Shell captures heat at three stages instead of one, drastically increasing efficiency."
  },
  {
    id: 4, emoji: "⚡", title: "Electricity Generated",
    subtitle: "Ultra-low cost energy",
    color: "#001a3a", glow: "#4488ff",
    stats: [
      { label: "Annual Output", value: "200–250 GWh" },
      { label: "Cost/MWh", value: "$10–30" },
      { label: "vs Grid", value: "$120–180" }
    ],
    detail: "Generates electricity far cheaper than grid power."
  },
  {
    id: 6, emoji: "🏔️", title: "Hydro Storage",
    subtitle: "Store → release for profit",
    color: "#001528", glow: "#0099dd",
    stats: [
      { label: "Store", value: "$10–20" },
      { label: "Sell", value: "$80–150" },
      { label: "Spread", value: "$60–130" }
    ],
    detail: "Stores cheap energy and sells at peak demand."
  },
  {
    id: 7, emoji: "🚗", title: "EV Charging",
    subtitle: "Fast + affordable",
    color: "#001a0a", glow: "#44cc77",
    stats: [
      { label: "Charge Time", value: "9–12 min" },
      { label: "Price", value: "$8–15" },
      { label: "Competitors", value: "$25–40" }
    ],
    detail: "Fastest charging at half the price."
  }
];

function App() {

  const [active, setActive] = React.useState(1);
  const [tab, setTab] = React.useState("flow");

  const activeStage = stages.find(s => s.id === active);

  return (
    <div style={{ maxWidth: 600, margin: "0 auto" }}>

      {/* HEADER */}
      <div style={{
        padding: 14,
        background: "#111",
        borderBottom: `3px solid ${SHELL_YELLOW}`
      }}>
        <div style={{ color: SHELL_YELLOW, fontSize: 10 }}>Shell ECHO</div>
        <div style={{ fontWeight: "bold" }}>Technical Process</div>
      </div>

      {/* TABS */}
      <div style={{ display: "flex" }}>
        {["flow","stats"].map(t => (
          <button key={t} onClick={()=>setTab(t)}
            style={{ flex:1, padding:10, background:"none", border:"none",
              color: tab===t ? SHELL_YELLOW : "#555" }}>
            {t.toUpperCase()}
          </button>
        ))}
      </div>

      {/* FLOW */}
      {tab==="flow" && (
        <div style={{ padding:16 }}>

          <div style={{ display:"flex", gap:6, overflowX:"auto" }}>
            {stages.map(s=>(
              <div key={s.id}
                onClick={()=>setActive(s.id)}
                style={{
                  padding:"6px 12px",
                  borderRadius:20,
                  border:`1px solid ${active===s.id ? s.glow : "#333"}`,
                  cursor:"pointer"
                }}>
                {s.emoji} {s.title}
              </div>
            ))}
          </div>

          <div style={{
            marginTop:16,
            padding:20,
            borderRadius:20,
            border:`2px solid ${activeStage.glow}`
          }}>
            <h2>{activeStage.title}</h2>
            <p>{activeStage.detail}</p>

            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8, marginTop:10 }}>
              {activeStage.stats.map((s,i)=>(
                <div key={i}>
                  <strong>{s.value}</strong>
                  <div style={{ fontSize:10 }}>{s.label}</div>
                </div>
              ))}
            </div>

            {/* SYSTEM INSIGHT */}
            <div style={{
              marginTop:16,
              padding:12,
              background:"#001a0a",
              borderRadius:10
            }}>
              <b>💡 Insight:</b> Efficiency increases to 80%, reducing cost to $10–30/MWh.
            </div>

          </div>
        </div>
      )}

      {/* STATS */}
      {tab==="stats" && (
        <div style={{ padding:16 }}>

          {/* CHART */}
          <div style={{ marginBottom:20 }}>
            <h4>Electricity Cost Comparison</h4>

            {[
              {label:"ECHO", value:30, color:"#44cc77"},
              {label:"Thermal", value:50, color:"#FBCE07"},
              {label:"Waste", value:120, color:"#ff6600"},
              {label:"Grid", value:180, color:"#cc4444"}
            ].map((b,i)=>(
              <div key={i}>
                {b.label} ${b.value}
                <div style={{ background:"#222", height:8 }}>
                  <div style={{
                    width:`${(b.value/180)*100}%`,
                    background:b.color,
                    height:"100%"
                  }}/>
                </div>
              </div>
            ))}
          </div>

          <p style={{ fontSize:10, color:"#555" }}>
            Sources: Shell · DOE · IEA · Hydropower Association · EPA
          </p>

        </div>
      )}

    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));

</script>
</body>
</html>
